<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="./src/init.js" type="module"></script>
  <link rel="stylesheet" href="src/style.css">
</head>

<body>
  <div class="main">
    <div class="main__videos">
      <div id="video-grid"></div>

    </div>
    <div class="main__controls">
      <button id="audio-btn">🔇 Звук</button>
      <button id="video-btn">📹 Видео</button>
      <button id="screen-btn">🖥️ Демонстрация</button>
      <button id="leave-btn" class="danger">📞 Покинуть</button>
    </div>

    <div class="main__chat">
      <div class="chat__messages" id="chat-messages">
        <!-- сообщения будут здесь -->
      </div>
      <div class="chat__input">
        <input type="text" id="chat-input" placeholder="Введите сообщение...">
        <button id="chat-send">Отправить</button>
      </div>

    </div>
  </div>
</body>
